packages:
  - "packages/*"
  - "examples/*"
  - "!examples/monorepo-*"
  - "!examples/with-nx"
  - "!documentation"
  - "!examples/blog-*"
  - "!examples/mern-dashboard-client"
  - "!examples/with-nextjs-headless"
  - "!examples/store"

# Security overrides for vulnerable transitive dependencies (pnpm 10+ reads
# settings from here, not from the package.json `pnpm` field).
overrides:
  "ws@>=8.0.0 <8.21.0": ">=8.21.0"
  "ws@>=7.0.0 <7.5.11": ">=7.5.11"
  "form-data": "4.0.6"
  "cross-spawn@>=7.0.0 <7.0.5": ">=7.0.5"
  "cross-spawn@<6.0.6": ">=6.0.6"
  "tmp@<0.2.6": ">=0.2.6"
  "qs@>=6.7.0 <6.15.2": ">=6.15.2"
  # critical advisories — patch-safe bumps within the same major
  "handlebars@<4.7.9": ">=4.7.9"
  "shell-quote@<1.8.4": ">=1.8.4"
  "next@>=15.0.0 <15.3.6": ">=15.3.6 <16.0.0"
  "@remix-run/node@>=2.0.0 <2.17.2": ">=2.17.2"
  # high advisories — same-major patch bumps (avoid crossing majors: breaks lerna/toolchain)
  "path-to-regexp@<0.1.12": ">=0.1.12 <0.2.0"
  "path-to-regexp@>=8.0.0 <8.4.0": ">=8.4.0 <9.0.0"
  "semver@>=7.0.0 <7.5.2": ">=7.5.2 <8.0.0"
  "minimatch@>=3.0.0 <3.1.3": ">=3.1.3 <4.0.0"
  "minimatch@>=9.0.0 <9.0.7": ">=9.0.7 <10.0.0"
  "effect@<3.20.0": ">=3.20.0 <4.0.0"
  # major-bump advisories in non-shipped tooling (verified not to break toolchain/tests)
  "sigstore@<4.1.1": ">=4.1.1"
  "turbo-stream@<3.0.0": ">=3.0.0"
  "tar@>=6.0.0 <7.5.7": ">=7.5.7"
  "vite@<6.4.3": ">=6.4.3 <7.0.0"

patchedDependencies:
  "@changesets/git@3.0.0": patches/@changesets__git@3.0.0.patch
