_format_version: "1.1"

services:
  - name: auth
    url: http://supabase_auth:9999
    routes:
      - name: auth-route
        paths:
          - /auth/v1

  - name: rest
    url: http://supabase_rest:3000
    routes:
      - name: rest-route
        paths:
          - /rest/v1

  - name: storage
    url: http://supabase_storage:5000
    routes:
      - name: storage-route
        paths:
          - /storage/v1

plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:5173"
        - "http://127.0.0.1:5173"
        - "http://localhost:3000"
        - "http://127.0.0.1:3000"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        - HEAD
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Api-Version
        - Apikey
        - Authorization
        - X-Client-Info
        - Range
      exposed_headers:
        - Content-Range
        - X-Total-Count
      credentials: true
      max_age: 3600
